<!DOCTYPE html>
<html>
<head>
  <title>My First Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4f4f4;
}

/* Main container */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1 {
  color: #2c3e50;
  margin-bottom: 5px;
}

.title {
  color: #7f8c8d;
  margin-bottom: 15px;
}

/* Sections */
.section {
  background: white;
  padding: 15px;
  margin: 10px 0;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
  text-align: center;
}

/* Image */
img {
  width: 150px;
  border-radius: 50%;
  margin: 15px 0;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 5px;
  background-color: #3498db;
  color: white;
  cursor: pointer;
}

button:hover {
  background-color: #2980b9;
}
</style>
</head>
<script>
function showMessage() {
  document.getElementById("output").textContent = "You can reach me soon!";
}

function changeColor() {
  const colors = ["#3498db", "#2ecc71", "#e74c3c", "#9b59b6"];
  const random = colors[Math.floor(Math.random() * colors.length)];
  document.body.style.backgroundColor = random;
}
</script>
<body>
  <div class="container">
    <h1>Teslim 👋</h1>
    <p class="title">Aspiring Frontend Developer</p>

    <img src="https://via.placeholder.com/200" alt="My Image">

    <div class="section">
      <h2>About Me</h2>
      <p>I’m learning frontend development and building my first projects.</p>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <p>HTML, CSS, JavaScript (Beginner)</p>
    </div>

    <div class="buttons">
      <button onclick="showMessage()">Contact Me</button>
      <button onclick="changeColor()">Change Background</button>
    </div>

    <p id="output"></p>
  </div>
</body>
</html>
